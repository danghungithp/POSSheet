<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VinaPOS Mobile - Smart Scanning</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation;
        }
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        
        .animate-pop-in { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        #reader video {
            object-fit: cover !important;
            border-radius: 24px;
        }
    </style>
</head>
<body class="bg-[#F1F5F9] text-slate-900 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, className = "w-5 h-5", ...props }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className} ref={iconRef} {...props}></i>;
        };

        const API_URL = "https://script.google.com/macros/s/AKfycbxqcjr7UtUKXYkB2uBkkc6Sy4NMXFfFtofOgohUQpJsvukmOqOHHIf1RKXGZpqBVxyZ/exec";

        function App() {
            const [activeTab, setActiveTab] = useState('pos');
            const [products, setProducts] = useState([]);
            const [cart, setCart] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [isSyncing, setIsSyncing] = useState(false);
            const [showScanner, setShowScanner] = useState(false);
            const [notification, setNotification] = useState(null);
            const scannerRef = useRef(null);

            // Giả lập dữ liệu nếu API chưa sẵn sàng
            useEffect(() => {
                fetchData();
            }, []);

            const fetchData = async () => {
                setIsSyncing(true);
                try {
                    const res = await fetch(API_URL);
                    const data = await res.json();
                    setProducts(data.products || []);
                } catch (e) {
                    // Dữ liệu mẫu nếu lỗi
                    setProducts([
                        { id: "8934567890123", name: "Gà rán KFC miếng lớn", price: 35000, stock: 50 },
                        { id: "12345", name: "Coca Cola 330ml", price: 10000, stock: 120 },
                        { id: "67890", name: "Bánh mì Pate", price: 15000, stock: 30 }
                    ]);
                } finally {
                    setIsSyncing(false);
                }
            };

            const addToCart = (product) => {
                setCart(prev => {
                    const existing = prev.find(item => item.id === product.id);
                    if (existing) return prev.map(item => item.id === product.id ? { ...item, quantity: item.quantity + 1 } : item);
                    return [...prev, { ...product, quantity: 1 }];
                });
                // Haptic feedback giả lập
                if (window.navigator.vibrate) window.navigator.vibrate(50);
            };

            // Logic quét mã
            useEffect(() => {
                if (showScanner) {
                    const config = { fps: 15, qrbox: { width: 250, height: 150 } };
                    const html5QrCode = new Html5Qrcode("reader");
                    scannerRef.current = html5QrCode;

                    html5QrCode.start({ facingMode: "environment" }, config, (text) => {
                        const found = products.find(p => p.id.toString() === text);
                        if (found) {
                            addToCart(found);
                            setNotification({ type: 'success', title: 'Đã thêm!', message: `Đã quét: ${found.name}` });
                            stopScanner();
                        } else {
                            setNotification({ type: 'error', title: 'Lỗi', message: `Không tìm thấy mã: ${text}` });
                            stopScanner();
                        }
                    }).catch(err => console.error(err));
                }
                return () => stopScanner();
            }, [showScanner, products]);

            const stopScanner = () => {
                if (scannerRef.current) {
                    scannerRef.current.stop().then(() => setShowScanner(false)).catch(() => setShowScanner(false));
                } else {
                    setShowScanner(false);
                }
            };

            const filteredProducts = useMemo(() => {
                return products.filter(p => 
                    p.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                    p.id.toString().includes(searchTerm)
                );
            }, [searchTerm, products]);

            const total = cart.reduce((acc, item) => acc + (item.price * item.quantity), 0);

            return (
                <div className="flex flex-col h-screen max-w-md mx-auto bg-white shadow-2xl relative">
                    {/* Header */}
                    <header className="safe-top bg-white border-b px-6 py-4 flex justify-between items-center z-10">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                                <Icon name="Zap" className="text-white w-5 h-5 fill-current"/>
                            </div>
                            <h1 className="font-extrabold text-xl tracking-tight">VinaPOS</h1>
                        </div>
                        <button onClick={fetchData} className={`p-2 rounded-full ${isSyncing ? 'animate-spin text-blue-500' : 'text-slate-400'}`}>
                            <Icon name="RefreshCw" className="w-5 h-5" />
                        </button>
                    </header>

                    {/* Tìm kiếm & Quét (Tích hợp) */}
                    <div className="px-6 py-4 bg-white sticky top-0 z-10">
                        <div className="relative group">
                            <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                                <Icon name="Search" />
                            </div>
                            <input 
                                type="text" 
                                placeholder="Tên hàng hoặc mã vạch..." 
                                className="w-full bg-slate-100 border-none rounded-2xl py-4 pl-12 pr-14 font-semibold text-sm focus:ring-2 focus:ring-blue-500 transition-all outline-none"
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                            />
                            {/* NÚT QUÉT MÃ TRONG Ô TÌM KIẾM */}
                            <button 
                                onClick={() => setShowScanner(true)}
                                className="absolute right-2 top-1/2 -translate-y-1/2 bg-blue-600 text-white p-2.5 rounded-xl shadow-lg active:scale-90 transition-transform"
                            >
                                <Icon name="ScanBarcode" className="w-5 h-5" />
                            </button>
                        </div>
                    </div>

                    {/* Danh sách sản phẩm */}
                    <main className="flex-1 overflow-y-auto px-6 pb-40">
                        <div className="grid grid-cols-2 gap-4">
                            {filteredProducts.map(p => (
                                <div key={p.id} onClick={() => addToCart(p)} className="bg-white border border-slate-100 rounded-3xl p-4 shadow-sm active:bg-slate-50 transition-colors">
                                    <div className="aspect-square bg-slate-50 rounded-2xl mb-3 flex items-center justify-center text-slate-300">
                                        <Icon name="Package" className="w-10 h-10" />
                                    </div>
                                    <h3 className="font-bold text-xs text-slate-700 h-8 line-clamp-2 leading-tight">{p.name}</h3>
                                    <p className="text-blue-600 font-extrabold mt-2 italic text-sm">{p.price.toLocaleString()}đ</p>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* Thanh toán & Giỏ hàng */}
                    {cart.length > 0 && (
                        <div className="fixed bottom-24 left-4 right-4 bg-slate-900 text-white p-5 rounded-[32px] shadow-2xl flex items-center justify-between animate-pop-in z-20">
                            <div className="flex items-center gap-3">
                                <div className="bg-blue-600 p-3 rounded-2xl relative">
                                    <Icon name="ShoppingBag" />
                                    <span className="absolute -top-1 -right-1 bg-white text-blue-600 text-[10px] font-black px-1.5 rounded-full">{cart.reduce((a,b)=>a+b.quantity,0)}</span>
                                </div>
                                <div>
                                    <p className="text-[10px] uppercase font-bold opacity-40">Tổng cộng</p>
                                    <p className="text-lg font-black">{total.toLocaleString()}đ</p>
                                </div>
                            </div>
                            <button className="bg-blue-600 px-6 py-3 rounded-xl font-black text-sm active:bg-blue-700">THANH TOÁN</button>
                        </div>
                    )}

                    {/* Bottom Navigation */}
                    <nav className="bg-white/80 backdrop-blur-md border-t px-8 py-4 flex justify-between safe-bottom">
                        <NavTab icon="Store" label="Bán hàng" active />
                        <NavTab icon="Package2" label="Kho" />
                        <NavTab icon="BarChart3" label="Báo cáo" />
                        <NavTab icon="History" label="Lịch sử" />
                    </nav>

                    {/* UI Quét mã toàn màn hình */}
                    {showScanner && (
                        <div className="fixed inset-0 z-[100] bg-black flex flex-col">
                            <div className="p-8 flex justify-between items-center text-white safe-top">
                                <div>
                                    <h2 className="text-xl font-black">Máy quét VinaPOS</h2>
                                    <p className="text-xs opacity-60">Đưa mã vạch vào khung hình</p>
                                </div>
                                <button onClick={stopScanner} className="bg-white/10 w-12 h-12 rounded-full flex items-center justify-center backdrop-blur-md">
                                    <Icon name="X" />
                                </button>
                            </div>
                            <div className="flex-1 flex items-center justify-center p-6">
                                <div id="reader" className="w-full aspect-[4/3] relative">
                                    {/* Overlay trang trí khung quét */}
                                    <div className="absolute inset-0 border-2 border-blue-500/30 rounded-3xl z-10 pointer-events-none">
                                        <div className="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-blue-500 rounded-tl-3xl"></div>
                                        <div className="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-blue-500 rounded-tr-3xl"></div>
                                        <div className="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-blue-500 rounded-bl-3xl"></div>
                                        <div className="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-blue-500 rounded-br-3xl"></div>
                                    </div>
                                </div>
                            </div>
                            <div className="p-10 text-center text-white/20 font-bold uppercase tracking-widest text-[10px] safe-bottom">
                                VINAPOS SCAN ENGINE v3.0
                            </div>
                        </div>
                    )}

                    {/* Notification Toast */}
                    {notification && (
                        <div className="fixed top-24 left-6 right-6 z-[150] animate-pop-in">
                            <div className={`p-4 rounded-2xl shadow-xl flex items-center gap-3 ${notification.type === 'success' ? 'bg-emerald-500 text-white' : 'bg-red-500 text-white'}`}>
                                <Icon name={notification.type === 'success' ? 'CheckCircle' : 'AlertTriangle'} />
                                <div className="flex-1">
                                    <p className="text-xs font-black">{notification.title}</p>
                                    <p className="text-[10px] opacity-80">{notification.message}</p>
                                </div>
                                <button onClick={() => setNotification(null)}><Icon name="X" className="w-4 h-4" /></button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function NavTab({ icon, label, active }) {
            return (
                <div className={`flex flex-col items-center gap-1 ${active ? 'text-blue-600' : 'text-slate-300'}`}>
                    <Icon name={icon} className="w-6 h-6" />
                    <span className="text-[9px] font-bold uppercase tracking-tighter">{label}</span>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
